{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Period Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top app-nav">
    <div class="container">
        <a class="navbar-brand app-brand" href="index.html">Period Tracker</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-1">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="symptoms.html">Symptoms</a>
            <a class="nav-link" href="healthtips.html">Health Tips</a>
            <a class="nav-link active" href="Contact">Contact</a>
        </div>
    </div>
</nav>

<main class="container page-shell">
    <section class="section reveal">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card content-card">
                    <p class="section-kicker mb-1">Get In Touch</p>
                    <h2 class="section-title">Contact Us</h2>
                    <p class="text-muted">Questions, feedback, or ideas? Send us a message.</p>
                    <form action="" method="post" class="row g-3 mt-1">
                        {% csrf_token %}
                        <div class="col-md-6">
                            <input type="text" name="name" placeholder="Your Name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" name="email" placeholder="Your Email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <input type="text" name="subject" placeholder="Subject" class="form-control">
                        </div>
                        <div class="col-12">
                            <textarea name="message" rows="5" placeholder="Your Message" class="form-control" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-danger w-100">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="app-footer">&copy; 2026 Period Tracker. All rights reserved.</footer>
</main>

<script>
    document.querySelector("form").addEventListener("submit", function (e) {
        const name = document.querySelector('input[name="name"]').value.trim();
        const email = document.querySelector('input[name="email"]').value.trim();
        const message = document.querySelector('textarea[name="message"]').value.trim();

        if (!name || !email || !message) {
            e.preventDefault();
            alert("Please fill in all required fields.");
        }
    });
</script>
<script src="{% static 'js/site.js' %}"></script>
</body>
</html>
