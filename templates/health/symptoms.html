{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top app-nav">
    <div class="container">
        <a class="navbar-brand app-brand" href="index.html">Period Tracker</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-1">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link active" href="symptoms.html">Symptoms</a>
            <a class="nav-link" href="healthtips.html">Health Tips</a>
            <a class="nav-link" href="Contact">Contact</a>
        </div>
    </div>
</nav>

<main class="container page-shell">
    <section class="section reveal">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="glass-card content-card">
                    <p class="section-kicker mb-1">Daily Log</p>
                    <h2 class="section-title text-center">Track Today's Symptoms</h2>
                    <form method="post">
                        {% csrf_token %}
                        <label for="symptomsInput" class="form-label">Add Symptoms</label>
                        <input type="text" class="form-control" id="symptomsInput" name="symptom" placeholder="Ex: Cramps, Mood Swings">
                        <div class="emoji-container">
                            <button type="button" class="emoji-button" onclick="addSymptom('Headache')">🤕</button>
                            <button type="button" class="emoji-button" onclick="addSymptom('Cramps')">😣</button>
                            <button type="button" class="emoji-button" onclick="addSymptom('Cold')">🤧</button>
                            <button type="button" class="emoji-button" onclick="addSymptom('Fatigue')">🥱</button>
                            <button type="button" class="emoji-button" onclick="addSymptom('Stress')">🤯</button>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 mt-3">Add Symptom</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section class="section reveal">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="glass-card content-card text-center">
                    <p class="section-kicker mb-1">AI Insight</p>
                    <h3 class="section-title">Predicted Related Symptoms</h3>
                    <p id="predictedSymptoms" class="info-banner mb-0"></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="app-footer">&copy; 2026 Period Tracker. All rights reserved.</footer>
</main>

<script>
    function addSymptom(symptom) {
        document.getElementById("symptomsInput").value = symptom;
        predictSymptoms(symptom);
    }

    function predictSymptoms(selectedSymptom) {
        const symptomPredictions = {
            Headache: ["Fatigue", "Dehydration", "Stress"],
            Cramps: ["Mood Swings", "Lower Back Pain", "Bloating"],
            Cold: ["Sore Throat", "Congestion", "Fatigue"],
            Fatigue: ["Dizziness", "Lack of Focus", "Irritability"],
            Stress: ["Anxiety", "Tension Headache", "Sleep Issues"],
        };

        const predictionArea = document.getElementById("predictedSymptoms");

        if (selectedSymptom in symptomPredictions) {
            predictionArea.innerHTML = `<strong>Predicted:</strong> ${symptomPredictions[selectedSymptom].join(", ")}`;
        } else {
            predictionArea.innerHTML = "<strong>Predicted:</strong> No prediction available.";
        }
    }
</script>
<script src="{% static 'js/site.js' %}"></script>
</body>
</html>
